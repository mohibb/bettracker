name: Tests

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v --junit-xml=test-results.xml --cov=app --cov-report=term-missing --cov-report=xml

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: pytest
          path: test-results.xml
          reporter: java-junit

      - name: Publish coverage results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: coverage
          path: coverage.xml
          reporter: dotnet-coverage-cobertura
